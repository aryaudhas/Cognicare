<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CogniCare — Hello!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css"/>
  <style>
    body { background: linear-gradient(135deg, #e8f5f3 0%, #f0f9ff 100%); }
    .p-container { max-width: 680px; margin: 0 auto; padding: 32px 20px; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; }
    .back-link { display: flex; align-items: center; gap: 6px; color: var(--teal-dark); font-weight: 600; font-size: 14px; text-decoration: none; padding: 8px 14px; background: var(--teal-light); border-radius: 8px; }
    .clock-box { background: white; border-radius: 20px; padding: 28px 32px; text-align: center; margin-bottom: 24px; box-shadow: var(--shadow-lg); border: 1px solid var(--border); }
    .alerts-box { margin-bottom: 20px; min-height: 10px; }
    .chat-box { background: white; border-radius: 20px; padding: 20px; box-shadow: var(--shadow); border: 1px solid var(--border); }
    .chat-messages { height: 260px; overflow-y: auto; padding: 8px 4px; margin-bottom: 14px; }
    .chat-form { display: flex; gap: 10px; }
    .next-reminder-bar { background: white; border: 2px solid var(--teal); border-radius: 14px; padding: 16px 20px; margin-bottom: 16px; display: flex; align-items: center; gap: 14px; }
    .nr-icon { font-size: 32px; }
    .nr-label { font-size: 18px; font-weight: 600; color: var(--text); }
    .nr-time  { font-size: 14px; color: var(--teal-dark); font-family: 'JetBrains Mono',monospace; }
  </style>
</head>
<body>
<div class="p-container">

  <!-- Top bar -->
  <div class="top-bar">
    <a href="index.html" class="back-link">← Caregiver View</a>
    <div style="font-size:13px;color:var(--text-muted);font-weight:500;">Patient Mode</div>
  </div>

  <!-- Clock & greeting -->
  <div class="clock-box">
    <div class="patient-clock" id="pClock">--:--</div>
    <div class="patient-date"  id="pDate">Loading...</div>
    <div class="patient-greeting" id="pGreeting" style="margin-bottom:0;font-size:28px;margin-top:12px;">Hello!</div>
  </div>

  <!-- Next reminder bar -->
  <div id="nextReminderBar" style="display:none;" class="next-reminder-bar">
    <div class="nr-icon" id="nrIcon">🔔</div>
    <div>
      <div class="nr-label" id="nrLabel">—</div>
      <div class="nr-time" id="nrTime">—</div>
    </div>
  </div>

  <!-- Active alerts area -->
  <div class="alerts-box" id="alertsBox"></div>

  <!-- Action buttons -->
  <div style="margin-bottom:20px;">
    <button class="patient-btn patient-btn-done" onclick="markDone()">✅ I'm doing okay</button>
    <button class="patient-btn patient-btn-help" onclick="callHelp()">🙋 I need some help</button>
    <button class="patient-btn patient-btn-call" onclick="callEmergency()" style="background:#ef4444;">🚨 Call my caregiver</button>
  </div>

  <!-- Simple AI chat -->
  <div class="chat-box">
    <div style="font-family:'DM Serif Display',serif;font-size:20px;margin-bottom:14px;color:var(--text);">💬 Talk to your assistant</div>
    <div class="chat-messages" id="chatMessages">
      <div class="chat-bubble ai">Hello! I'm here to help you. You can ask me anything or just chat with me. How are you feeling today? 😊</div>
    </div>
    <div class="chat-form">
      <input type="text" class="patient-chat-input" id="patientChatInput" placeholder="Type here or just say hello..." onkeydown="if(event.key==='Enter')sendPatientMsg()">
      <button class="btn btn-primary btn-lg" onclick="sendPatientMsg()" style="flex-shrink:0;">Send</button>
    </div>
  </div>

</div>

<div id="toast"></div>
<script src="config.js"></script>
<script>
const TYPE_ICONS={meal:'🍽️',medication:'💊',bathroom:'🚽',hydration:'💧',activity:'🚶',social:'👥',sleep:'😴',grooming:'🪥'};
let reminders=[], patientId='P001', patientName='Margaret', aiTyping=false;
let firedReminders=new Set();

// Clock
function updatePatientClock(){
  const now=new Date();
  document.getElementById('pClock').textContent=now.toLocaleTimeString('en-CA',{hour:'2-digit',minute:'2-digit',hour12:false});
  document.getElementById('pDate').textContent=now.toLocaleDateString('en-CA',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  const h=now.getHours();
  document.getElementById('pGreeting').textContent=
    `Good ${h<12?'morning':h<17?'afternoon':'evening'}, ${patientName}!`;
}
updatePatientClock();
setInterval(updatePatientClock,1000);

// Check reminders every 30s
function checkReminders(){
  const now=new Date();
  const hhmm=now.toLocaleTimeString('en-CA',{hour:'2-digit',minute:'2-digit',hour12:false}).slice(0,5);

  // Find next upcoming reminder
  const upcoming=reminders
    .filter(r=>r.active)
    .map(r=>({...r,minDiff:(parseInt(r.time.split(':')[0])*60+parseInt(r.time.split(':')[1]))-(now.getHours()*60+now.getMinutes())}))
    .filter(r=>r.minDiff>=0)
    .sort((a,b)=>a.minDiff-b.minDiff);

  if(upcoming.length){
    const next=upcoming[0];
    document.getElementById('nextReminderBar').style.display='flex';
    document.getElementById('nrIcon').textContent=TYPE_ICONS[next.type]||'🔔';
    document.getElementById('nrLabel').textContent=`Coming up: ${next.label}`;
    document.getElementById('nrTime').textContent=`At ${next.time} — in ${next.minDiff===0?'now':`${next.minDiff} min`}`;
  }

  // Fire due reminders
  reminders.filter(r=>r.active&&r.time===hhmm&&!firedReminders.has(r.id)).forEach(r=>{
    firedReminders.add(r.id);
    showAlert(r);
    // Web notification
    if(Notification.permission==='granted'){
      new Notification(`CogniCare Reminder`,{body:r.label,icon:'🧠'});
    }
    // Log it
    apiFetch('/api/activity',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({patientId,type:'reminder_sent',message:`Reminder shown: ${r.label}`})});
  });
}

function showAlert(reminder){
  const div=document.createElement('div');
  div.className='reminder-alert';
  div.innerHTML=`
    <div class="reminder-alert-icon">${TYPE_ICONS[reminder.type]||'🔔'}</div>
    <div class="reminder-alert-text">${reminder.label}</div>
    <div style="font-size:16px;color:var(--text-muted);margin-top:8px;">${getEncouragement(reminder.type)}</div>
    <button onclick="this.parentElement.remove()" style="margin-top:14px;padding:10px 24px;background:var(--teal);color:white;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;">Got it! ✓</button>`;
  document.getElementById('alertsBox').prepend(div);
  speakReminder(reminder.label);
}

function getEncouragement(type){
  const m={meal:"It's time to eat! Good nutrition keeps you strong.",medication:"Don't forget your medication. It helps you stay well.",bathroom:"Take a moment for a bathroom break.",hydration:"Time to drink some water. Staying hydrated is important!",activity:"A little movement is good for your body and mind.",social:"This is a great time to connect with someone you love.",sleep:"Rest time. A good rest helps you feel refreshed.",grooming:"Time to freshen up!"};
  return m[type]||"Time for your scheduled activity.";
}

function speakReminder(text){
  if('speechSynthesis' in window){
    const u=new SpeechSynthesisUtterance(text);
    u.rate=0.85; u.pitch=1.1; u.volume=1;
    window.speechSynthesis.speak(u);
  }
}

function markDone(){
  showToast("Great job! You're doing wonderful. 😊",'success');
  apiFetch('/api/activity',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({patientId,type:'patient_response',message:'Patient confirmed they are okay'})});
}

function callHelp(){
  document.getElementById('patientChatInput').value="I need some help";
  sendPatientMsg();
}

function callEmergency(){
  speakReminder("Calling your caregiver now. Please stay calm.");
  showToast("📞 Alerting caregiver...","success");
  apiFetch('/api/activity',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({patientId,type:'alert',message:'⚠️ Patient pressed emergency button!'})});
}

// Chat
const chatHistory=[];
async function sendPatientMsg(){
  if(aiTyping)return;
  const input=document.getElementById('patientChatInput');
  const msg=input.value.trim();
  if(!msg)return;
  input.value='';

  addChatBubble(msg,'user');
  chatHistory.push({role:'user',content:msg});

  aiTyping=true;
  const thinking=addChatBubble('...','ai',true);

  try{
    const res=await apiFetch('/api/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({messages:chatHistory,patientId,mode:'patient'})
    });
    const data=await res.json();
    thinking.remove();
    const reply=data.response||"I'm here with you. Tell me more.";
    addChatBubble(reply,'ai');
    chatHistory.push({role:'assistant',content:reply});
    speakReminder(reply);
  }catch{
    thinking.remove();
    const fallback="I'm here with you! How are you feeling right now?";
    addChatBubble(fallback,'ai');
  }
  aiTyping=false;
}

function addChatBubble(text,role,isTemp=false){
  const msgs=document.getElementById('chatMessages');
  const div=document.createElement('div');
  div.className=`chat-bubble ${role}`;
  div.textContent=text;
  if(isTemp) div.style.opacity='.5';
  msgs.appendChild(div);
  msgs.scrollTop=msgs.scrollHeight;
  return div;
}

// Load reminders and request notification permission
async function init(){
  if(Notification.permission==='default') Notification.requestPermission();
  try{
    const res=await apiFetch(`/api/reminders?patientId=${patientId}`);
    reminders=await res.json();
    checkReminders();
    setInterval(checkReminders,30000);

    // Load patient name
    const pr=await apiFetch(`/api/patients/${patientId}`);
    const patient=await pr.json();
    if(patient.name) patientName=patient.name.split(' ')[0];
  }catch{ reminders=[]; }
}

let _tt;
function showToast(msg,type='success'){
  const el=document.getElementById('toast');
  el.textContent=msg; el.className='show '+(type||'success');
  clearTimeout(_tt); _tt=setTimeout(()=>el.className='',4000);
}

init();
</script>
</body>
</html>
